<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Worker Dashboard</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="../css/style.css">

    <link rel="stylesheet"
        href="../css/responsive.css">

</head>

<body>

    <section class="dashboard-section">

        <div class="container">

            <!-- HEADER -->

            <div class="dashboard-header">

                <div>

                    <h1 id="workerWelcome">
                        Welcome Back
                    </h1>

                    <p>
                        Manage your bookings and work requests
                    </p>

                </div>

                <button
                    class="btn btn-danger"
                    id="workerLogoutBtn">

                    Logout

                </button>

            </div>

            <!-- STATS -->

            <div class="dashboard-stats">

                <div class="dashboard-card">

                    <h5>Total Jobs</h5>

                    <h2 id="totalJobs">
                        0
                    </h2>

                </div>

                <div class="dashboard-card">

                    <h5>Accepted Jobs</h5>

                    <h2 id="acceptedJobs">
                        0
                    </h2>

                </div>

                <div class="dashboard-card">

                    <h5>Completed Jobs</h5>

                    <h2 id="completedJobs">
                        0
                    </h2>

                </div>

            </div>

            <!-- PROFILE CARD -->

            <div class="worker-profile-card">

                <h3>
                    Worker Profile
                </h3>

                <div class="profile-details">

                    <p>
                        <strong>Name:</strong>

                        <span id="workerName"></span>
                    </p>

                    <p>
                        <strong>Email:</strong>

                        <span id="workerEmail"></span>
                    </p>

                    <p>
                        <strong>Category:</strong>

                        <span id="workerCategory"></span>
                    </p>

                    <p>
                        <strong>Availability:</strong>

                        <span id="workerAvailability"></span>
                    </p>

                </div>

            </div>

            <!-- BOOKINGS -->

            <div class="recent-bookings">

                <h2>
                    Booking Requests
                </h2>

                <div id="workerBookingsContainer">

                </div>

            </div>

        </div>

    </section>

    <script src="../js/worker-dashboard.js"></script>

</body>

</html>
