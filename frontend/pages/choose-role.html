<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Choose Role</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="role-section">

        <div class="container">

            <div class="text-center mb-4">

                <a href="../index.html">

                    <img src="../images/logo.png" alt="OneStop Logo" class="role-page-logo">

                </a>

            </div>

            <div class="text-center mb-5">

                <h1 class="role-title">

                    Continue As

                </h1>

                <p class="role-subtitle">

                    Choose your account type

                </p>

            </div>

            <div class="row justify-content-center g-4">

                <!-- USER -->

                <div class="col-lg-4 col-md-6">

                    <div class="role-card">

                        <div class="role-icon">

                            <i class="fa-solid fa-user"></i>

                        </div>

                        <h2>User</h2>

                        <p>

                            Book services and manage your bookings easily.

                        </p>

                        <a href="login.html?role=user" class="btn role-btn">

                            Continue

                        </a>

                    </div>

                </div>

                <!-- WORKER -->

                <div class="col-lg-4 col-md-6">

                    <div class="role-card">

                        <div class="role-icon">

                            <i class="fa-solid fa-user-gear"></i>

                        </div>

                        <h2>Worker</h2>

                        <p>

                            Manage jobs, accept bookings and grow your work.

                        </p>

                        <a href="worker-login.html" class="btn role-btn">

                            Continue

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
