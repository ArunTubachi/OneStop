<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Worker Authentication</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <!-- Responsive CSS -->

    <link rel="stylesheet" href="../css/responsive.css">

</head>

<body>

    <section class="auth-section">

        <div class="container">

            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

                <div class="col-lg-6">

                    <div class="auth-box">

                        <div class="text-center mb-4">

                            <a href="../index.html">

                                <img src="../images/logo.png" alt="OneStop Logo" class="auth-logo">

                            </a>

                        </div>

                        <!-- TOGGLE -->

                        <div class="auth-toggle">

                            <button id="workerLoginTab" class="auth-switch active-auth">

                                Login

                            </button>

                            <button id="workerRegisterTab" class="auth-switch">

                                Register

                            </button>

                        </div>

                        <!-- LOGIN -->

                        <form id="workerLoginForm">

                            <h2 class="auth-title">

                                Worker Login

                            </h2>

                            <div class="mb-3">

                                <label>Email</label>

                                <input type="email" id="workerLoginEmail" class="form-control auth-input" required>

                            </div>

                            <div class="mb-3">

                                <label>Password</label>

                                <input type="password" id="workerLoginPassword" class="form-control auth-input"
                                    required>

                            </div>

                            <button type="submit" class="btn auth-btn w-100">

                                Login

                            </button>

                        </form>

                        <!-- REGISTER -->

                        <form id="workerRegisterForm" style="display:none;">

                            <h2 class="auth-title">

                                Worker Registration

                            </h2>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label>Name</label>

                                    <input type="text" id="workerName" class="form-control auth-input" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Email</label>

                                    <input type="email" id="workerEmail" class="form-control auth-input" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Phone</label>

                                    <input type="tel" id="workerPhone" maxlength="10" class="form-control auth-input"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Category</label>

                                    <select id="workerCategory" class="form-control auth-input" required>

                                        <option value="">
                                            Select
                                        </option>

                                        <option>
                                            Cleaning
                                        </option>

                                        <option>
                                            Plumbing
                                        </option>

                                        <option>
                                            Electrical
                                        </option>

                                        <option>
                                            Painting
                                        </option>

                                        <option>
                                            Gardening
                                        </option>

                                        <option>
                                            Moving
                                        </option>

                                    </select>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Experience</label>

                                    <input type="text" id="workerExperience" class="form-control auth-input"
                                        placeholder="5 Years" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label>Password</label>

                                    <input type="password" id="workerPassword" class="form-control auth-input" required>

                                </div>

                                <div class="col-12 mb-3">

                                    <label>Address</label>

                                    <textarea id="workerAddress" class="form-control auth-input" rows="3"
                                        required></textarea>

                                </div>

                            </div>

                            <button type="submit" class="btn auth-btn w-100">

                                Submit Registration

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="../js/worker-auth.js"></script>

</body>

</html>
