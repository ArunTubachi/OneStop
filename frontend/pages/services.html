<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Services</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container">

            <a class="navbar-brand" href="../index.html">

                <img src="../images/logo.png" alt="OneStop Logo" class="logo-img">

            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarContent">

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item">

                        <a class="nav-link" href="../index.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link active-nav" href="services.html">

                            Services

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="#" id="dashboardBtn">

                            Dashboard

                        </a>

                    </li>

                    <li class="nav-item ms-lg-3">

                        <a href="#" class="btn login-btn" id="loginBtn">

                            Login

                        </a>

                    </li>

                    <li class="nav-item ms-lg-3">

                        <a href="#" class="btn book-btn" id="bookNowBtn">

                            Book Now

                        </a>

                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- SERVICES HEADER -->

    <section class="services-header reveal">

        <div class="container">

            <h1 class="services-title">

                Explore Our Services

            </h1>

            <p class="services-text">

                Discover professional home services
                for every household need.

            </p>

        </div>

    </section>

    <!-- SERVICES AREA -->

    <section class="services-page-section reveal">

        <div class="container">

            <div class="row">

                <!-- FILTER SIDEBAR -->

                <div class="col-lg-3">

                    <div class="filter-box">

                        <h3>
                            Filters
                        </h3>

                        <div class="search-box">

                            <i class="fa-solid fa-magnifying-glass"></i>

                            <input type="text" id="searchInput" placeholder="Search services">

                        </div>

                        <div class="category-list">

                            <button class="category-btn active-category" data-category="All">
                                All Services
                            </button>

                            <button class="category-btn" data-category="Cleaning">
                                Cleaning
                            </button>

                            <button class="category-btn" data-category="Plumbing">
                                Plumbing
                            </button>

                            <button class="category-btn" data-category="Electrical">
                                Electrical
                            </button>

                            <button class="category-btn" data-category="Painting">
                                Painting
                            </button>

                            <button class="category-btn" data-category="Gardening">
                                Gardening
                            </button>

                            <button class="category-btn" data-category="Moving">
                                Moving
                            </button>

                        </div>

                    </div>

                </div>

                <!-- SERVICE CARDS -->

                <div class="col-lg-9">

                    <div class="row g-4" id="servicesContainer">
                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="../js/app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
