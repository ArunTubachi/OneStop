<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Authentication</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <!-- Responsive CSS -->

    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="auth-section">

        <div class="container">

            <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

                <div class="col-lg-5">

                    <div class="auth-box">
                        <div class="text-center mb-4">

                            <a href="../index.html">

                                <img src="../images/logo.png" alt="OneStop Logo" class="auth-logo">

                            </a>

                        </div>

                        <!-- TOGGLE -->

                        <div class="auth-toggle">

                            <button id="loginTab" class="auth-switch active-auth">

                                Login

                            </button>

                            <button id="registerTab" class="auth-switch">

                                Register

                            </button>

                        </div>

                        <!-- LOGIN FORM -->

                        <form id="loginForm" autocomplete="off">

                            <h2 class="auth-title">

                                Welcome Back

                            </h2>

                            <div class="mb-3">

                                <label>Email</label>

                                <input type="email" id="loginEmail" class="form-control auth-input" required>

                            </div>

                            <div class="mb-3">

                                <label>Password</label>

                                <input type="password" id="loginPassword" class="form-control auth-input" required>

                            </div>

                            <button type="submit" class="btn auth-btn w-100">

                                Login

                            </button>

                        </form>

                        <!-- REGISTER FORM -->

                        <form id="registerForm" autocomplete="off" style="display:none;">

                            <h2 class="auth-title">

                                Create Account

                            </h2>

                            <div class="mb-3">

                                <label>Full Name</label>

                                <input type="text" id="registerName" class="form-control auth-input" required>

                            </div>

                            <div class="mb-3">

                                <label>Email</label>

                                <input type="email" id="registerEmail" class="form-control auth-input" required>

                            </div>

                            <div class="mb-3">

                                <label>Phone</label>

                                <input type="tel" id="registerPhone" class="form-control auth-input" maxlength="10"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label>Password</label>

                                <input type="password" id="registerPassword" class="form-control auth-input" required>

                            </div>

                            <button type="submit" class="btn auth-btn w-100">

                                Register

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="../js/login.js"></script>

</body>

</html>
