<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Booking</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="booking-section">

        <div class="container">

            <div class="row g-5">

                <!-- LEFT -->

                <div class="col-lg-5">

                    <div class="booking-service-info" id="bookingServiceInfo">
                        <div id="selectedWorkerInfo"></div>

                    </div>

                </div>

                <!-- RIGHT -->

                <div class="col-lg-7">

                    <form class="booking-form" id="bookingForm">

                        <div class="row g-4">

                            <div class="col-md-6">

                                <input type="text" required id="customerName" class="form-control booking-input"
                                    placeholder="Full Name">

                            </div>

                            <div class="col-md-6">

                                <input type="email" required id="customerEmail" class="form-control booking-input"
                                    placeholder="Email Address">

                            </div>

                            <div class="col-md-6">

                                <input type="tel" required  id="customerPhone" class="form-control booking-input" placeholder="Phone Number" maxlength="10">

                            </div>

                            <div class="col-md-6">

                                <input type="date" required id="bookingDate" class="form-control booking-input">

                            </div>

                            <div class="col-12">

                                <textarea class="form-control booking-input" required id="bookingNotes" rows="5"
                                    placeholder="Enter Your Full Address"></textarea>

                            </div>

                            <div class="col-12">

                                <button type="submit" class="btn book-btn">

                                    Confirm Booking

                                </button>

                            </div>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </section>

    <!-- JS -->

    <script src="../js/app.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
